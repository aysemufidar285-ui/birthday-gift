<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#ff9ec4,#ffd6e8);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

.container{
text-align:center;
color:white;
animation:fade 2s;
padding:20px;
}

h1{
font-size:42px;
margin-bottom:15px;
}

p{
font-size:20px;
margin-bottom:25px;
}

button{
padding:15px 35px;
border:none;
border-radius:30px;
background:white;
color:#ff4f8b;
font-size:18px;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.05);
}

@keyframes fade{
from{opacity:0;}
to{opacity:1;}
}
</style>

</head>
<body>

<div class="container">
<h1>Happy Birthday ❤️</h1>

<p>Untuk seseorang yang paling spesial di hidupku.</p>

<button onclick="alert('Selamat ulang tahun sayang ❤️')">
Buka Hadiah 🎁
</button>

</div>

</body>
</html>
